<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Гуляй, Вася!</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: black;
      overflow: hidden;
      font-family: sans-serif;
    }
    .screen {
      display: none;
      width: 100%;
      height: 100vh;
      position: relative;
    }
    .screen.active {
      display: block;
    }
    .screen img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .hotspot {
      position: absolute;
      border: none;
      background: transparent;
      cursor: pointer;
    }
    .hotspot:hover {
      background-color: rgba(0, 255, 0, 0.3);
      border: 1px solid rgba(0, 255, 0, 0.6);
      z-index: 9999;
    }
  </style>
</head>
<body>
<!-- Экран 1 -->
<div id="screen1" class="screen active">
  <img src="images/Registration.png" alt="Registration">
  <!-- Кнопка "Регистрация" -->
  <button class="hotspot" style="top: 81.2%; left: 50%; transform: translate(-50%, -50%); width: 17%; height: 6%;" onclick="showScreen(2)"></button>
</div>

<script>
  function showScreen(number) {
    for (let i = 1; i <= 15; i++) {
      document.getElementById('screen' + i).classList.remove('active');
    }
    document.getElementById('screen' + number).classList.add('active');
  }
  window.showScreen = showScreen;
</script>
